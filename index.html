<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Images</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            padding: 2rem;
        }
        h1 {
            text-align: center;
            margin-bottom: 2rem;
            color: #333;
        }
        .gallery {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }
        .gallery figure {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
            padding: 1rem;
        }
        .gallery img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 4px;
        }
        .gallery figcaption {
            text-align: center;
            padding: 0.75rem 0 0.25rem;
            color: #555;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <h1>Images</h1>
    <p style="text-align:center; color:#777; margin-bottom:2rem; font-size:0.95rem;">
        これらの画像は著作権フリーです。商用・非商用を問わず、許可なく自由にご利用いただけます。<br>
        All images are free to use. No permission required for any purpose, including commercial use.
    </p>
    <div class="gallery">
        <figure>
            <img src="triaxial_template.png" alt="Triaxial Template">
            <figcaption>triaxial_template.png</figcaption>
        </figure>
        <figure>
            <img src="vecg_template.png" alt="VECG Template">
            <figcaption>vecg_template.png</figcaption>
        </figure>
        <figure>
            <img src="triaxial_vecg_template.png" alt="Triaxial VECG Template">
            <figcaption>triaxial_vecg_template.png</figcaption>
        </figure>
        <figure>
            <img src="E733E415-EB00-4226-8D4B-54AC9A9E195F.jpg" alt="Image">
            <figcaption>E733E415-EB00-4226-8D4B-54AC9A9E195F.jpg</figcaption>
        </figure>
    </div>
</body>
</html>
