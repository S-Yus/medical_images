<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#ffffff"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Grid lines (subtle) -->
  <line x1="120" y1="400" x2="440" y2="400" stroke="rgba(255,255,255,0.15)" stroke-width="3"/>
  <line x1="120" y1="320" x2="440" y2="320" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
  <line x1="120" y1="240" x2="440" y2="240" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
  <line x1="120" y1="160" x2="440" y2="160" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
  <line x1="120" y1="80" x2="120" y2="400" stroke="rgba(255,255,255,0.15)" stroke-width="3"/>
  <!-- Sigmoid/dose-response curve (main graph line) -->
  <path d="M120,380 C160,378 200,375 240,360 C270,348 290,310 310,250 C330,190 350,150 380,135 C400,125 420,120 440,118"
        fill="none" stroke="url(#line)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Small medical cross -->
  <rect x="355" y="55" width="60" height="20" rx="4" fill="rgba(255,255,255,0.9)"/>
  <rect x="375" y="35" width="20" height="60" rx="4" fill="rgba(255,255,255,0.9)"/>
  <!-- Axis arrow tips -->
  <polygon points="440,395 440,405 455,400" fill="rgba(255,255,255,0.4)"/>
  <polygon points="115,80 125,80 120,65" fill="rgba(255,255,255,0.4)"/>
</svg>
